name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@v4

      # Assembles everything, runs JVM unit tests (Vec3, Konsist architecture
      # rules) and lint. Milestone exit criterion: this must be green.
      - name: Build and test
        run: ./gradlew build
